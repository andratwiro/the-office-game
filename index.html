<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1C3A5E">
<title>Dunder Mifflin Trivia</title>
<link rel="icon" href="brand/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="brand/apple-touch-icon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="frame">
  <header class="topbar">
    <div class="wordmark">
      <img class="logo" src="brand/dunder-mifflin-navy.svg" alt="Dunder Mifflin Paper Company" width="92" height="54">
      <small>Branch trivia · 20:00 club</small>
    </div>
    <div class="rec"><span class="dot"></span> REC</div>
  </header>
  <main id="stage" class="stage"><!-- rendered by game.js --></main>
</div>

<!-- Firebase (compat SDK, no build step) — matches the riot project -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="episodes.js"></script>
<script src="app.js"></script>
<script src="game.js"></script>
</body>
</html>
